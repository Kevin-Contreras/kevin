<body>

  <nav>
    <ul class="escritorio">
      <li><button id="boton1">Home</button></li>
      <li><button id="boton2">Proyects</button></li>
      <li><button id="boton3">Contact</button></li>
    </ul>
    <ul class="movil">
      <li><button id="boton1"style=" float:left;" >Kevin</button></li>
      <li style=" float:right;">
        <div class="container"  onclick="myFunction(this)">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </div></li>
      <div id="n">
        <li><button id="boton4" style="display:block;">Home</button></li>

  <div id="todo" class="animate__animated  animate__fadeIn animate__slower">
  </div>

<script>
  var n = document.getElementById("n")


  window.addEventListener("load",function(e){
      n.style.display="none";
    })
  function myFunction(x) {
    
  if(  x.classList.toggle("change")==false){
    n.style.display="none";
  }else{
    n.style.display="block";
  }
  

}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="actual.css">
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
  <title>KEVIN</title>

</head>
<body>

  <nav >
   
    <ul class="escritorio">
      <div class="ojos"><div class="vista"><div class="pupilas"></div></div></div>
      <li><button id="boton1">Home</button></li>
      <li><button id="boton2">Proyects</button></li>
      <li><button id="boton3">Contact</button></li>
    </ul>
    <ul class="movil" >

      <li><button id="boton1"style=" float:left;" >KEVIN DEV</button></li>
      <li style=" float:right;">
        <div class="container"  onclick="myFunction(this)">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </div></li>
      <div id="n" >
        <li><button id="boton4" class="animate__animated animate__fadeInLeft" style="display:block;">Home</button></li>
        <li><button id="boton5" class="animate__animated animate__fadeInLeft" style="display:block;">Proyects</button></li>
        <li><button id="boton6"class="animate__animated animate__fadeInLeft" style="display:block;">Contact</button></li>
      </div>
       
      
      
    </ul>
  </nav>


  <div id="todo" class="animate__animated  animate__fadeIn animate__slower">
  </div>
  
</body>
<script>
  var n = document.getElementById("n")
  var todo = document.getElementById("todo")
  var n2 = document.getElementById("boton4")
  var n3 = document.getElementById("boton5")
  var n4 = document.getElementById("boton6")
  var container = document.querySelector(".container")
  var bar1 = document.querySelector(".bar1")
  var bar2 = document.querySelector(".bar2")
  var bar3 = document.querySelector(".bar3")
  var movimento = document.getElementsByClassName("pupilas")
  document.onmousemove = function(event){
    var x = event.clientX*100/window.innerWidth+"%";
    var y = event.clientY*100/window.innerWidth+"%";
    for (let i = 0; i < 2; i++) {
      movimento[i].style.left=x;
      movimento[i].style.top=y;
      movimento[i].style.transform = "translate(-"+x+","+y+")";
      
    }

  }


  window.addEventListener("load",function(e){
      n.style.display="none";
    })
    n2.addEventListener("click",function(e){
  myFunction();

})
n3.addEventListener("click",function(e){
  myFunction();

})
n4.addEventListener("click",function(e){
  myFunction();

})
  function myFunction() {

  if(  container.classList.toggle("change")==false){
    n.style.display="none";
    

  }else{
    n.style.display="block";
  }
  

}


</script>
<script src="index.js"></script>
</html>
